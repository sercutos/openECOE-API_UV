version: '3'
services:
  openecoe-webui:
    build:
      context: .
      dockerfile: Dockerfile   
    
    ports:
      - 4200:4200
    volumes:
      - ./:/app
      - /app/node_modules
    environment:      
      BACKEND_URL: "http://host.docker.internal:5001"
        

    command: ng serve --host 0.0.0.0 --poll=2000
