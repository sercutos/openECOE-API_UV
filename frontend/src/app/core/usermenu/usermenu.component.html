<a class="user" *ngIf="userData" nz-dropdown [nzDropdownMenu]="menu" nzTrigger="click">
  <i nz-icon nzType="user" nzTheme="outline"></i> 
    {{userData?.user?.name}}
  <i nz-icon nzType="caret-down"></i>
</a>
<nz-dropdown-menu #menu="nzDropdownMenu" >
  <ul nz-menu>
    <li nz-menu-item (click)="goTo('/control-panel')">
      {{"SETTINGS" | translate}}
    </li>
    <li nz-menu-item >
      <a href="assets/pdf/Manual_OpenECOE2026_administradores.pdf" target="_blank" rel="noopener noreferrer">
        {{ "ADMINISTRATOR_GUIDE" | translate }}
      </a>
    </li>
    <li nz-menu-item >
      <a href="assets/pdf/Manual_OpenECOE2026_evaluadores.pdf" target="_blank" rel="noopener noreferrer">
        {{ "EVALUATOR_GUIDE" | translate }}
      </a>
    </li>
    <li nz-menu-item (click)="logout()">
      {{"LOG_OUT" | translate}}
    </li>
  </ul>
</nz-dropdown-menu>
